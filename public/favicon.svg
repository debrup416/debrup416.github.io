<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#262657"/>
      <stop offset="1" stop-color="#0d0d1f"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#bg)" stroke="#ff4da6" stroke-opacity="0.45" stroke-width="2"/>
  <text x="32" y="33" fill="#ff4da6" font-family="'Segoe UI', Verdana, sans-serif" font-size="40" font-weight="700" text-anchor="middle" dominant-baseline="central" filter="url(#glow)">D</text>
</svg>
